```properties
spring.application.name=quantity-measurement-app

# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# H2 DATABASE (In-Memory)
# ===============================
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# LOGGING
# ===============================
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# SWAGGER (SpringDoc OpenAPI)
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# ===============================
# JWT CONFIG (HARDCODED FOR NOW)
# ===============================
application.security.jwt.secret-key=mysupersecretkey
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ===============================
# GOOGLE OAUTH (DUMMY VALUES FOR NOW)
# ===============================
spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
```
